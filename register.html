}

nav a{
  color:#ccc;
  margin-right:15px;
  text-decoration:none;
}
nav a:hover{color:#fff;}

.container{
  display:flex;
  justify-content:center;
  align-items:center;
  height:80vh;
}

.form-box{
  background:#0b1220;
  padding:30px;
  border-radius:12px;
  width:300px;
}

h2{text-align:center;margin-bottom:20px;}

input{
  width:100%;
  padding:10px;

  border:none;
  border-radius:6px;

button{

  padding:10px;
  background:#e2b94b;

  border-radius:6px;
